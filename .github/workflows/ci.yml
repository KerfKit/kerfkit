name: CI
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # haftalık matris (Pzt 05:00 UTC) — macOS ayakları
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with: { swift-version: "6.1" }
      - name: Motor + golden testler
        run: swift test
      - name: Token pipeline senkron kontrolu
        run: |
          node tools/gen-tokens.mjs
          git diff --exit-code apps/web/styles/tokens.css
      # W-2: commit'li wasm motoru golden 001/002 ile bit-eşit mi? Motor değişip
      # tools/build-wasm.sh koşulmadıysa burada kırmızıya düşer (bilinçli bekçi).
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Wasm motor paritesi (Node)
        run: node --no-warnings tools/wasm-parite.mjs
      # L-1: taban dil EN — uygulama kaynaklarında hardcoded Türkçe literal yasak.
      - name: i18n bekcisi
        run: python3 tools/i18n-bekci.py
      - name: Katalog senkron bekçisi (iOS↔Android — docs/18 §5.2c)
        run: python3 tools/katalog-senkron-bekci.py
      # K-18: metin 4.5:1 / UI-dekor 3:1 (docs/12 §8) — kullanılan çift listesi.
      - name: Kontrast bekçisi
        run: python3 tools/kontrast-bekci.py
      # L-4: mağaza metni karakter limitleri (name/subtitle/keywords/short/full + 6 başlık).
      - name: ASO limit bekcisi
        run: python3 tools/aso-limit-bekci.py
      # L-3: web build — reviewed:false sayfa üretilmez; hreflang/route bozulursa kırmızı.
      - name: Web build (Astro)
        run: |
          npm --prefix apps/web ci
          npm --prefix apps/web run build

  # K-17 (E6-S1) — matris ayakları. Repo PRIVATE: macOS dakikaları 10× faturalı,
  # bu yüzden PR'da DEĞİL yalnız main push + haftalık + elle tetikte koşar.
  # PR bekçisi ubuntu 'test' job'ıdır (branch protection onu zorunlu kılar).
  matris-macos:
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Golden vektörler (macOS, saf XCTest)
        run: swift test
      - name: xcodegen
        run: brew install xcodegen && cd apps/ios && xcodegen generate
      # UI smoke (docs/17 K-17): proje aç → parça gir → optimize (QuickAdd)
      # + dışa aktarım ucu (kilitli karo → paywall). Snapshot testleri BİLEREK
      # dışarıda: runner simülatör render'ı yerel referanslarla birebir değil.
      # Skip 1.9 eklentisi Xcode 26 SwiftPM'i ister; runner varsayılanı 16.4'te
      # build-plan aşamasında düşüyor (ilk matris koşusu bulgusu).
      - name: En yeni Xcode'u seç
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Seçilen: $XC" && sudo xcode-select -s "$XC"
      - name: iOS smoke (simülatör)
        run: |
          cd apps/ios
          xcodebuild test -project KerfKit.xcodeproj -scheme KerfKit \
            -skipPackagePluginValidation -skipMacroValidation \
            TEST_RUNNER_CI=1 \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:KerfKitUITests/QuickAddFlowTests \
            -only-testing:KerfKitUITests/PaywallGateUITests/testExportLockedTilesOpenPaywall

  matris-android:
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Skip + Swift Android SDK
        run: |
          brew install skiptools/skip/skip gradle
          skip android sdk install
      # Derleme bekçisi: motor + UI native Android'e çapraz derleniyor mu?
      # Emülatörlü parite (tools/android-parite.sh) yerel araç olarak kalır —
      # runner'da emülatör hızlandırması güvenilmez (K-17 bilinçli sınır).
      - name: Android APK derleme
        env:
          ANDROID_HOME: /Users/runner/Library/Android/sdk
        run: |
          cd apps/android/Android
          gradle assembleDebug --console=plain
