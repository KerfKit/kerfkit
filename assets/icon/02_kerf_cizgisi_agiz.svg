<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- D-1 / aile (a) kerf-çizgisi: kesintisiz diyagonal kerf; bıçağın girdiği kenarda
       belirgin V-ağız (kesim başlangıcı). Katmanlar: zemin / işaret. -->
  <g id="zemin">
    <rect width="1024" height="1024" fill="#1C1917"/>
    <g fill="none" stroke="#E7E5E4" stroke-opacity="0.04" stroke-width="16">
      <path d="M0 178 C260 150 520 212 1024 176"/>
      <path d="M0 420 C300 458 640 386 1024 430"/>
      <path d="M0 662 C240 626 560 700 1024 664"/>
      <path d="M0 892 C320 922 700 856 1024 894"/>
    </g>
  </g>
  <g id="isaret" fill="#F59E0B" transform="rotate(-45 512 512)">
    <polygon points="-300,342 980,342 1324,232 1324,792 980,682 -300,682"/>
  </g>
</svg>
