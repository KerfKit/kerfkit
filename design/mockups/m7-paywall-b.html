<!doctype html><html lang="tr"><head><meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>M-7 B yatay kartlar + karşılaştırma</title>
<link rel="stylesheet" href="../../apps/web/styles/tokens.css">
<style>
* { box-sizing:border-box; margin:0; font-family:-apple-system,"SF Pro Text",sans-serif; }
body { background:var(--color-timber-950); color:var(--color-timber-200); width:390px; margin:0 auto; min-height:844px; padding:16px 20px 28px; }
.kapat { text-align:right; font-size:22px; color:var(--color-timber-500); }
h1 { color:var(--color-timber-50); font-size:24px; margin-top:6px; }
.kartlar { display:flex; gap:8px; margin:16px 0; }
.kart { flex:1; border:1px solid var(--color-timber-700); border-radius:12px; padding:12px 8px; text-align:center; }
.kart.onerilen { border:2px solid var(--color-amber-500); background:var(--color-timber-900); }
.kart h3 { font-size:13px; color:var(--color-timber-300); }
.kart .f { font-size:19px; font-weight:800; color:var(--color-amber-400); margin:6px 0 2px; }
.kart .d { font-size:10px; color:var(--color-timber-500); }
table { width:100%; border-collapse:collapse; font-size:13px; margin:12px 0; }
td { padding:8px 4px; border-bottom:1px solid var(--color-timber-800); }
td.v { text-align:center; color:var(--color-green-500); }
td.k { text-align:center; color:var(--color-timber-500); }
.cta { width:100%; height:56px; border:0; border-radius:14px; font-size:17px; font-weight:800;
       background:var(--color-amber-500); color:var(--color-timber-950); }
.alt { margin-top:12px; text-align:center; font-size:13px; color:var(--color-timber-500); }
</style></head><body>
<div class="kapat">✕</div>
<h1>Atölyenin tam sürümü</h1>
<div class="kartlar">
<div class="kart onerilen"><h3>Ömür boyu</h3><div class="f">$99.99</div><div class="d">tek ödeme</div></div>
<div class="kart"><h3>Yıllık</h3><div class="f">$39.99</div><div class="d">yılda bir</div></div>
<div class="kart"><h3>72 saat</h3><div class="f">$4.99</div><div class="d">yenilenmez</div></div>
</div>
<table>
<tr><td>Sınırsız hesaplama + diyagram</td><td class="v">Ücretsizde bile ✓</td></tr>
<tr><td>3+ proje kaydı</td><td class="v">✓</td></tr>
<tr><td>21+ parça</td><td class="v">✓</td></tr>
<tr><td>PDF · CSV · .cutproj</td><td class="v">✓</td></tr>
<tr><td>Atölye Modu (tam)</td><td class="v">✓</td></tr>
</table>
<button class="cta">Ömür boyu al — $99.99</button>
<div class="alt">Geri yükle · İade · hello@kerfkit.app</div>
</body></html>
