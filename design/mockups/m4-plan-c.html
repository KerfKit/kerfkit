<style>
* { box-sizing:border-box; margin:0; font-family:-apple-system,"SF Pro Text",sans-serif; }
body { background:var(--color-timber-950); color:var(--color-timber-200); width:390px; margin:0 auto; min-height:844px; padding-bottom:32px; }

.statkart span { font-size:11px; color:var(--color-timber-300); }
.hedef { display:flex; margin:0 16px 12px; background:var(--color-timber-900); border-radius:10px; padding:3px; }

         padding:10px 14px; border-radius:10px; display:flex; justify-content:space-between; }
.diyagram { margin:0 16px; }
.levhalar { display:flex; gap:6px; justify-content:center; margin:10px 0; font-size:12px; color:var(--color-timber-500); }
.levhalar .n { background:var(--color-amber-500); color:var(--color-timber-950); border-radius:6px; padding:2px 10px; font-weight:700; }
.paylas { display:flex; gap:8px; margin:14px 16px 0; }
.paylas span { flex:1; text-align:center; background:var(--color-timber-900); border-radius:10px; padding:12px 0; font-size:13px; color:var(--color-timber-50); }
.unplaced { margin:12px 16px 0; background:var(--color-timber-900); border-left:4px solid var(--color-red-500); border-radius:10px; padding:12px 14px; font-size:13px; }
.unplaced b { color:var(--color-red-500); }
