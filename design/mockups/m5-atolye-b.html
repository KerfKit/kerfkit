<!doctype html><html lang="tr"><head><meta charset="utf-8">
<meta name="viewport" content="width=800, initial-scale=1">
<title>M-5 B diyagram-hero (koyu + Tezgâh)</title>
<link rel="stylesheet" href="../../apps/web/styles/tokens.css">
<style>
* { box-sizing:border-box; margin:0; font-family:-apple-system,"SF Pro Text",sans-serif; }
body { background:#333; display:flex; gap:20px; justify-content:center; padding:16px; }
.tel { width:390px; min-height:844px; padding:16px 16px 32px; }
.koyu { background:var(--color-timber-950); color:var(--color-timber-200); }
.tezgah { background:var(--color-timber-50); color:var(--color-timber-950); }
.ust { display:flex; justify-content:space-between; align-items:center; font-size:14px; font-weight:700; }
.anahtar { border-radius:16px; padding:6px 14px; font-size:13px; }
.koyu .anahtar { background:var(--color-timber-800); }
.tezgah .anahtar { background:var(--color-amber-500); font-weight:800; }
.diyagram { margin-top:16px; height:280px; border-radius:12px; position:relative; background:var(--color-timber-800); }
.tezgah .diyagram { background:var(--color-timber-100); border:2px solid var(--color-timber-950); }
.diyagram .parca { position:absolute; background:var(--color-timber-700); border-radius:3px; }
.tezgah .diyagram .parca { background:var(--color-timber-300); }
.diyagram .aktif { background:var(--color-amber-500); outline:4px solid var(--color-amber-700); }
.diyagram .etiket { position:absolute; font-size:13px; font-weight:800; color:var(--color-timber-950); }
.ilerleme { margin-top:12px; height:8px; border-radius:4px; background:var(--color-timber-800); overflow:hidden; }
.tezgah .ilerleme { background:var(--color-timber-200); }
.ilerleme div { width:36%; height:100%; background:var(--color-amber-500); }
.sayac { margin-top:16px; font-size:14px; letter-spacing:2px; color:var(--color-timber-500); }
.talimat { margin-top:6px; font-size:34px; font-weight:800; }
.koyu .talimat { color:var(--color-timber-50); } .tezgah .talimat { font-size:40px; }
.kesildi { margin-top:18px; width:100%; height:60px; border:0; border-radius:14px; font-size:21px; font-weight:800;
           background:var(--color-amber-500); color:var(--color-timber-950); }
.tezgah .kesildi { height:68px; border:3px solid var(--color-timber-950); }
.geral { margin-top:10px; width:100%; height:56px; border-radius:14px; background:none; font-size:17px;
         border:1px solid var(--color-timber-700); color:inherit; }
</style></head><body>

<div class="tel koyu">
  <div class="ust"><span>‹ Plan</span><span>Atölye</span><span class="anahtar">☀︎ Tezgâh</span></div>
  <div class="diyagram">
    <div class="parca" style="left:10px;top:10px;width:150px;height:110px"></div>
    <div class="parca aktif" style="left:168px;top:10px;width:120px;height:160px"></div>
    <div class="etiket" style="left:200px;top:80px">Yan</div>
    <div class="parca" style="left:10px;top:128px;width:150px;height:120px"></div>
    <div class="parca" style="left:296px;top:10px;width:80px;height:238px"></div>
  </div>
  <div class="ilerleme"><div></div></div>
  <div class="sayac">KESİM 4/11 · LEVHA 1</div>
  <div class="talimat">Yan — 720 × 580</div>
  <button class="kesildi">✓ KESİLDİ</button>
  <button class="geral">Geri al</button>
</div>

<div class="tel tezgah">
  <div class="ust"><span>‹ Plan</span><span>Atölye</span><span class="anahtar">☀︎ Tezgâh AÇIK</span></div>
  <div class="diyagram">
    <div class="parca" style="left:10px;top:10px;width:150px;height:110px"></div>
    <div class="parca aktif" style="left:168px;top:10px;width:120px;height:160px"></div>
    <div class="etiket" style="left:200px;top:80px">Yan</div>
    <div class="parca" style="left:10px;top:128px;width:150px;height:120px"></div>
    <div class="parca" style="left:296px;top:10px;width:80px;height:238px"></div>
  </div>
  <div class="ilerleme"><div></div></div>
  <div class="sayac">KESİM 4/11 · LEVHA 1</div>
  <div class="talimat">Yan — 720 × 580</div>
  <button class="kesildi">✓ KESİLDİ</button>
  <button class="geral">Geri al</button>
</div>

</body></html>
