<!doctype html><html lang="tr"><head><meta charset="utf-8">
<meta name="viewport" content="width=800, initial-scale=1">
<title>M-5 A talimat-merkez (koyu + Tezgâh)</title>
<link rel="stylesheet" href="../../apps/web/styles/tokens.css">
<style>
* { box-sizing:border-box; margin:0; font-family:-apple-system,"SF Pro Text",sans-serif; }
body { background:#333; display:flex; gap:20px; justify-content:center; padding:16px; }
.tel { width:390px; min-height:844px; padding:16px 16px 32px; }
.koyu { background:var(--color-timber-950); color:var(--color-timber-200); }
.tezgah { background:var(--color-timber-50); color:var(--color-timber-950); }
.ust { display:flex; justify-content:space-between; align-items:center; font-size:14px; font-weight:700; }
.koyu .ust { color:var(--color-timber-50); } .tezgah .ust { color:var(--color-timber-950); }
.anahtar { border-radius:16px; padding:6px 14px; font-size:13px; }
.koyu .anahtar { background:var(--color-timber-800); color:var(--color-timber-200); }
.tezgah .anahtar { background:var(--color-amber-500); color:var(--color-timber-950); font-weight:800; }
.uyanik { font-size:11px; margin-top:6px; color:var(--color-timber-500); }
.sayac { margin-top:20px; font-size:14px; letter-spacing:2px; }
.koyu .sayac { color:var(--color-timber-300); } .tezgah .sayac { color:var(--color-timber-700); }
.halka { float:right; width:44px; height:44px; border-radius:50%; border:5px solid var(--color-timber-800);
         border-top-color:var(--color-amber-500); border-right-color:var(--color-amber-500); }
.tezgah .halka { border-color:var(--color-timber-200); border-top-color:var(--color-amber-600); }
.kart { margin-top:12px; border-radius:16px; padding:24px 20px; }
.koyu .kart { background:var(--color-timber-900); }
.tezgah .kart { background:#fff; border:3px solid var(--color-timber-950); }
.talimat { font-size:40px; font-weight:800; line-height:1.15; font-variant-numeric:tabular-nums; }
.koyu .talimat { color:var(--color-timber-50); } .tezgah .talimat { font-size:46px; }
.altbilgi { margin-top:10px; font-size:17px; }
.koyu .altbilgi { color:var(--color-timber-300); } .tezgah .altbilgi { color:var(--color-timber-700); font-size:19px; font-weight:600; }
.mini { margin-top:18px; height:120px; border-radius:8px; position:relative; background:var(--color-timber-800); }
.tezgah .mini { background:var(--color-timber-100); border:1px solid var(--color-timber-300); }
.mini .parca { position:absolute; background:var(--color-timber-700); border-radius:2px; }
.tezgah .mini .parca { background:var(--color-timber-300); }
.mini .aktif { background:var(--color-amber-500); outline:3px solid var(--color-amber-700); }
.kesildi { margin-top:20px; width:100%; height:64px; border:0; border-radius:14px; font-size:22px; font-weight:800;
           background:var(--color-amber-500); color:var(--color-timber-950); }
.tezgah .kesildi { height:72px; font-size:26px; border:3px solid var(--color-timber-950); }
.geral { margin-top:10px; width:100%; height:56px; border-radius:14px; background:none; font-size:17px; }
.koyu .geral { border:1px solid var(--color-timber-700); color:var(--color-timber-300); }
.tezgah .geral { border:2px solid var(--color-timber-700); color:var(--color-timber-950); font-weight:700; }
</style></head><body>

<div class="tel koyu">
  <div class="ust"><span>‹ Plan</span><span>Mutfak Dolabı</span><span class="anahtar">☀︎ Tezgâh</span></div>
  <div class="uyanik">● ekran uyanık kalır</div>
  <div class="sayac">KESİM 4/11 <span class="halka"></span></div>
  <div class="kart">
    <div class="talimat">Yan<br>720 × 580</div>
    <div class="altbilgi">Levha 1 · damar kilitli 🔒</div>
    <div class="mini">
      <div class="parca" style="left:8px;top:8px;width:60px;height:44px"></div>
      <div class="parca aktif" style="left:72px;top:8px;width:100px;height:70px"></div>
      <div class="parca" style="left:8px;top:56px;width:60px;height:56px"></div>
      <div class="parca" style="left:176px;top:8px;width:80px;height:104px"></div>
    </div>
  </div>
  <button class="kesildi">✓ KESİLDİ</button>
  <button class="geral">Geri al</button>
</div>

<div class="tel tezgah">
  <div class="ust"><span>‹ Plan</span><span>Mutfak Dolabı</span><span class="anahtar">☀︎ Tezgâh AÇIK</span></div>
  <div class="uyanik">● ekran uyanık kalır</div>
  <div class="sayac">KESİM 4/11 <span class="halka"></span></div>
  <div class="kart">
    <div class="talimat">Yan<br>720 × 580</div>
    <div class="altbilgi">Levha 1 · damar kilitli 🔒</div>
    <div class="mini">
      <div class="parca" style="left:8px;top:8px;width:60px;height:44px"></div>
      <div class="parca aktif" style="left:72px;top:8px;width:100px;height:70px"></div>
      <div class="parca" style="left:8px;top:56px;width:60px;height:56px"></div>
      <div class="parca" style="left:176px;top:8px;width:80px;height:104px"></div>
    </div>
  </div>
  <button class="kesildi">✓ KESİLDİ</button>
  <button class="geral">Geri al</button>
</div>

</body></html>
