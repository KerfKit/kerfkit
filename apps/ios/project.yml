# xcodegen ile üretilir: cd apps/ios && xcodegen generate (docs/06 §3 apps/ios)
name: KerfKit
options:
  bundleIdPrefix: app.kerfkit
  deploymentTarget:
    iOS: "17.0"
packages:
  kerfkit:
    path: ../..
targets:
  KerfKit:
    type: application
    platform: iOS
    sources: [KerfKit]
    dependencies:
      - package: kerfkit
        product: CutCore
      - package: kerfkit
        product: CutModels
      - package: kerfkit
        product: CutProj
      - package: kerfkit
        product: CutPersist
    info:
      path: KerfKit/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: KerfKit
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
