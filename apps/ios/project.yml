# xcodegen ile üretilir: cd apps/ios && xcodegen generate (docs/06 §3 apps/ios)
name: KerfKit
options:
  bundleIdPrefix: app.kerfkit
  deploymentTarget:
    iOS: "17.0"
packages:
  kerfkit:
    path: ../..
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
targets:
  KerfKit:
    type: application
    platform: iOS
    sources: [KerfKit]
    dependencies:
      - package: kerfkit
        product: CutCore
      - package: kerfkit
        product: CutModels
      - package: kerfkit
        product: CutProj
      - package: kerfkit
        product: CutPersist
    info:
      path: KerfKit/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: KerfKit
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
  KerfKitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [KerfKitUITests]
    dependencies:
      - target: KerfKit
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
  KerfKitTests:
    type: bundle.unit-test
    platform: iOS
    sources: [KerfKitTests]
    dependencies:
      - target: KerfKit
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  KerfKit:
    build:
      targets:
        KerfKit: all
    run:
      config: Debug
    test:
      config: Debug
      targets: [KerfKitTests, KerfKitUITests]
